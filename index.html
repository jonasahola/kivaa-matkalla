<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#78c9ed">
  <meta name="color-scheme" content="light">
  <meta name="description" content="Kivaa matkalla – Aholan bongauspeli koko perheelle">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <title>Kivaa matkalla – Aholan bongauspeli v5.2</title>
  <style>
    :root{
      --sky:#78c9ed;
      --sky-deep:#52a9d4;
      --leaf:#6aae43;
      --leaf-dark:#347046;
      --grass:#8fc64e;
      --road:#77736e;
      --road-dark:#595753;
      --paper:#fbf8ef;
      --paper-2:#f3eee3;
      --ink:#25282e;
      --ink-soft:#5d626b;
      --red:#c81726;
      --red-dark:#92121b;
      --gold:#f2c83d;
      --gold-dark:#a77c05;
      --blue:#2e83bc;
      --line:#d7d0c2;
      --shadow:0 6px 0 rgba(37,40,46,.13),0 14px 28px rgba(37,40,46,.11);
      --soft-shadow:0 4px 0 rgba(37,40,46,.12);
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --rounded:ui-rounded,"Arial Rounded MT Bold","Trebuchet MS",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      --sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    html{background:#d8edf5}
    body{
      overflow:hidden;
      color:var(--ink);
      font-family:var(--sans);
      -webkit-font-smoothing:antialiased;
      -webkit-tap-highlight-color:transparent;
      background:
        radial-gradient(circle at 10% 4%,rgba(255,255,255,.9),transparent 28%),
        linear-gradient(180deg,#d1ebf6,#eaf3ec 43%,#eee8db);
    }
    button,input{font:inherit}
    button{color:inherit}
    button:focus-visible,input:focus-visible{
      outline:4px solid rgba(39,140,205,.38);
      outline-offset:3px;
    }
    button{-webkit-user-select:none;user-select:none}
    .app{
      width:min(100%,900px);
      height:100dvh;
      min-height:100%;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      position:relative;
      background:var(--paper);
      box-shadow:0 0 44px rgba(31,44,54,.18);
    }

    /* Moving road scene */
    .hero{
      position:relative;
      flex:0 0 clamp(210px,31vw,286px);
      overflow:hidden;
      isolation:isolate;
      background:var(--sky);
      transition:flex-basis .42s cubic-bezier(.2,.8,.2,1);
    }
    .app.ingame .hero{flex-basis:132px}
    .scene,.scene>*{position:absolute;inset:0}
    .scene{z-index:0;overflow:hidden;background:linear-gradient(#7fd0f0 0 67%,#9dcc61 67% 100%)}
    .stars{
      opacity:0;
      background-image:
        radial-gradient(circle at 12% 22%,#fff 0 1.2px,transparent 1.8px),
        radial-gradient(circle at 34% 11%,#fff 0 1.4px,transparent 2px),
        radial-gradient(circle at 55% 28%,#fff 0 1.1px,transparent 1.7px),
        radial-gradient(circle at 74% 14%,#fff 0 1.3px,transparent 2px),
        radial-gradient(circle at 91% 31%,#fff 0 1.1px,transparent 1.7px);
      background-size:230px 100px;
      transition:opacity .35s;
    }
    .sun-moon{
      position:absolute;
      top:19px;
      right:74px;
      width:44px;
      height:44px;
      border-radius:50%;
      background:#ffd64d;
      box-shadow:0 0 0 7px rgba(255,224,103,.26),0 0 28px rgba(255,224,103,.7);
      transition:.35s;
    }
    .cloud-track{
      position:absolute;
      inset:12px auto auto 0;
      width:200%;
      height:76px;
      animation:cloud-drive 45s linear infinite;
      opacity:.9;
    }
    .cloud{
      position:absolute;
      left:var(--x);
      top:var(--y);
      width:86px;
      height:26px;
      border-radius:30px;
      background:rgba(255,255,255,.89);
      filter:drop-shadow(0 3px 0 rgba(91,145,168,.12));
      transform:scale(var(--s));
    }
    .cloud::before,.cloud::after{
      content:"";
      position:absolute;
      border-radius:50%;
      background:inherit;
    }
    .cloud::before{width:37px;height:37px;left:14px;bottom:5px}
    .cloud::after{width:29px;height:29px;right:12px;bottom:4px}
    @keyframes cloud-drive{to{transform:translateX(-50%)}}
    .hills{
      top:auto;
      bottom:54px;
      height:86px;
      background:
        radial-gradient(ellipse at 8% 100%,#559e4a 0 43%,transparent 44%),
        radial-gradient(ellipse at 28% 100%,#6db552 0 48%,transparent 49%),
        radial-gradient(ellipse at 49% 100%,#4d9645 0 42%,transparent 43%),
        radial-gradient(ellipse at 70% 100%,#6cb04d 0 49%,transparent 50%),
        radial-gradient(ellipse at 92% 100%,#4c9345 0 45%,transparent 46%);
      background-size:360px 86px;
      animation:hills-drive 18s linear infinite;
      opacity:.95;
    }
    @keyframes hills-drive{to{background-position:-360px 0}}
    .tree-track{
      position:absolute;
      left:0;
      bottom:51px;
      width:200%;
      height:74px;
      animation:tree-drive 9.5s linear infinite;
    }
    @keyframes tree-drive{to{transform:translateX(-50%)}}
    .tree{
      position:absolute;
      left:var(--x);
      bottom:0;
      width:13px;
      height:34px;
      border-radius:5px 5px 2px 2px;
      background:#775638;
      transform:scale(var(--s));
      transform-origin:bottom;
    }
    .tree::before,.tree::after{
      content:"";
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      border-radius:48% 52% 46% 54%;
      background:#3f8943;
      box-shadow:0 0 0 2px rgba(41,103,58,.08);
    }
    .tree::before{width:46px;height:42px;bottom:21px}
    .tree::after{width:34px;height:36px;bottom:43px;background:#61a847}
    .road{
      top:auto;
      bottom:0;
      height:58px;
      background:linear-gradient(#716d68,#807b74 48%,#66635f);
      border-top:5px solid #d8d3c7;
      box-shadow:inset 0 5px 0 rgba(0,0,0,.09);
    }
    .road::after{
      content:"";
      position:absolute;
      left:0;right:0;top:29px;
      height:5px;
      background:repeating-linear-gradient(90deg,transparent 0 58px,#f7f2df 58px 116px,transparent 116px 176px);
      background-size:176px 5px;
      animation:road-drive .92s linear infinite;
      filter:drop-shadow(0 2px 0 rgba(0,0,0,.13));
    }
    @keyframes road-drive{to{background-position:-176px 0}}
    .hero::after{
      content:"";
      position:absolute;inset:0;z-index:1;pointer-events:none;
      background:linear-gradient(90deg,rgba(255,255,255,.16),transparent 35%,rgba(0,0,0,.035));
    }
    .hero-truck{
      position:absolute;
      z-index:4;
      right:2px;
      bottom:-26px;
      width:min(62%,530px);
      max-height:96%;
      object-fit:contain;
      object-position:right bottom;
      filter:drop-shadow(0 8px 7px rgba(28,37,42,.26));
      animation:truck-bob 1.05s ease-in-out infinite alternate;
      transform-origin:60% 90%;
      transition:width .35s,bottom .35s,filter .25s;
    }
    @keyframes truck-bob{from{transform:translateY(0) rotate(-.12deg)}to{transform:translateY(-2px) rotate(.12deg)}}
    .app.ingame .hero-truck{width:min(45%,350px);bottom:-20px}
    .hero-truck.is-happy{animation:truck-celebrate .55s ease both}
    .hero-truck.is-surprised{animation:truck-surprise .55s ease both}
    @keyframes truck-celebrate{30%{transform:translateY(-13px) rotate(-1.6deg)}65%{transform:translateY(-5px) rotate(1.2deg)}}
    @keyframes truck-surprise{25%{transform:scale(1.04) translateY(-4px)}55%{transform:scale(.98) translateY(1px)}}
    .brand-card{
      position:absolute;
      z-index:6;
      left:14px;
      top:14px;
      width:clamp(162px,31vw,250px);
      padding:10px 14px 11px;
      border:3px solid var(--ink);
      border-radius:18px;
      background:rgba(255,253,247,.96);
      box-shadow:var(--soft-shadow);
      transform:rotate(-.6deg);
    }
    .brand-kicker{
      display:block;
      margin-bottom:1px;
      color:var(--red);
      font:900 10px/1 var(--rounded);
      letter-spacing:.16em;
    }
    .brand-card h1{
      margin:0;
      font:900 clamp(25px,4.5vw,39px)/.92 var(--rounded);
      letter-spacing:-.04em;
    }
    .brand-card h1 em{display:block;color:var(--red);font-style:normal}
    .brand-card p{margin:6px 0 0;font:800 10px/1.15 var(--rounded);color:var(--ink-soft)}
    .phase-btn{
      position:absolute;
      z-index:8;
      top:12px;
      right:12px;
      width:52px;
      height:52px;
      border-radius:50%;
      border:3px solid var(--ink);
      background:#fffdf7;
      box-shadow:var(--soft-shadow);
      font-size:25px;
      cursor:pointer;
    }
    .mood-chip{
      position:absolute;
      z-index:7;
      right:12px;
      bottom:10px;
      display:flex;
      align-items:center;
      gap:8px;
      max-width:200px;
      padding:6px 9px 6px 6px;
      border:2.5px solid var(--ink);
      border-radius:999px;
      background:rgba(255,253,247,.96);
      box-shadow:0 3px 0 rgba(37,40,46,.14);
    }
    .mood-chip img{width:42px;height:42px;border-radius:50%;object-fit:contain;background:#fff;border:2px solid #d5cec0}
    .mood-speech{font:900 11px/1.08 var(--rounded);color:var(--ink);white-space:nowrap}
    .app:not(.ingame) .mood-chip{display:none}
    .app.ingame .brand-card{width:154px;padding:7px 10px 8px;top:8px;left:9px;border-width:2.5px;border-radius:14px}
    .app.ingame .brand-card h1{font-size:23px}
    .app.ingame .brand-card p,.app.ingame .brand-kicker{display:none}
    .app.ingame .phase-btn{width:42px;height:42px;top:8px;right:8px;font-size:20px;border-width:2.5px}
    .app.ingame .mood-chip{right:8px;bottom:7px;padding:4px 7px 4px 4px}
    .app.ingame .mood-chip img{width:32px;height:32px}
    .app.ingame .mood-speech{font-size:9.5px;max-width:85px;overflow:hidden;text-overflow:ellipsis}

    .app[data-phase="dusk"] .scene{background:linear-gradient(#f2a56b 0,#e6a174 41%,#a8b76b 68%,#7fa24d 100%)}
    .app[data-phase="dusk"] .sun-moon{background:#ffefbb;box-shadow:0 0 0 7px rgba(255,231,174,.19),0 0 28px rgba(255,206,125,.65);transform:translateY(16px)}
    .app[data-phase="dusk"] .cloud{background:rgba(255,230,217,.78)}
    .app[data-phase="night"] .scene{background:linear-gradient(#122b54 0,#284e72 54%,#355f55 68%,#466d42 100%)}
    .app[data-phase="night"] .stars{opacity:.92}
    .app[data-phase="night"] .sun-moon{background:#fff4cb;box-shadow:0 0 0 7px rgba(255,251,221,.09),0 0 28px rgba(255,248,205,.43);transform:translateY(3px)}
    .app[data-phase="night"] .cloud{background:rgba(210,224,238,.47)}
    .app[data-phase="night"] .hills,.app[data-phase="night"] .tree-track{filter:brightness(.58) saturate(.8)}
    .app[data-phase="night"] .road{filter:brightness(.68)}

    main{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      overscroll-behavior:contain;
      padding:14px 14px calc(104px + var(--safe-bottom));
      background-color:var(--paper);
      background-image:radial-gradient(circle at 1px 1px,rgba(93,98,107,.095) 1px,transparent 1.2px);
      background-size:17px 17px;
      scroll-behavior:smooth;
    }
    .screen{width:100%;max-width:840px;margin:0 auto}
    .section-title{
      margin:4px 2px 8px;
      font:900 19px/1.15 var(--rounded);
      letter-spacing:-.02em;
    }
    .panel{
      padding:14px;
      margin-bottom:15px;
      border:3px solid var(--ink);
      border-radius:23px;
      background:rgba(255,253,247,.96);
      box-shadow:var(--soft-shadow);
    }
    .count-picker,.size-picker{display:grid;gap:8px}
    .count-picker{grid-template-columns:repeat(4,1fr)}
    .size-picker{grid-template-columns:repeat(3,1fr)}
    .choice{
      min-height:55px;
      padding:8px 6px;
      border:2.5px solid var(--line);
      border-radius:16px;
      background:#fff;
      cursor:pointer;
      font:900 15px/1 var(--rounded);
      transition:.16s transform,.16s border-color,.16s background;
    }
    .choice small{display:block;margin-top:5px;font:800 10px/1 var(--sans);color:var(--ink-soft)}
    .choice[aria-pressed="true"]{border-color:var(--red);background:#fff1f2;box-shadow:inset 0 0 0 1px var(--red)}
    .choice:active{transform:translateY(2px)}
    .players-form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;margin-top:12px}
    .player-field{
      min-width:0;
      display:flex;
      align-items:center;
      gap:8px;
      padding:7px 9px 7px 6px;
      border:2.5px solid var(--line);
      border-radius:16px;
      background:#fff;
    }
    .player-field.is-hidden{display:none}
    .avatar{width:43px;height:43px;border-radius:12px;object-fit:contain;background:#edf7fb;border:2px solid #bddbe7}
    .player-field:nth-child(2) .avatar{background:#fff4d5;border-color:#e7ca72}
    .player-field:nth-child(3) .avatar{background:#f6e6ea;border-color:#e7aeb7}
    .player-field:nth-child(4) .avatar{background:#eaf2df;border-color:#b8d18f}
    .player-field input{width:100%;min-width:0;border:0;outline:0;background:transparent;font:800 15px/1 var(--rounded);color:var(--ink)}
    .support-copy{margin:10px 2px 0;color:var(--ink-soft);font:650 12px/1.45 var(--sans)}
    .target-summary{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:10px 12px;margin-top:11px;
      border:2px dashed #c8bda9;border-radius:14px;background:#fbf5e9;
      font:800 12px/1.3 var(--rounded);
    }
    .link-btn{border:0;background:none;color:var(--red);font:900 12px/1 var(--rounded);text-decoration:underline;text-underline-offset:3px;cursor:pointer;white-space:nowrap}
    .start-actions{display:grid;gap:9px;margin-top:18px}
    .primary-btn,.secondary-btn,.ghost-btn{
      width:100%;min-height:54px;border-radius:17px;padding:12px 16px;cursor:pointer;
      font:900 15px/1.1 var(--rounded);box-shadow:var(--soft-shadow);transition:.14s transform,.14s filter;
    }
    .primary-btn{border:3px solid var(--red-dark);background:linear-gradient(#df2132,#c81726);color:white}
    .secondary-btn{border:3px solid var(--ink);background:#fffdf7;color:var(--ink)}
    .ghost-btn{border:2.5px solid var(--line);background:#f4efe5;color:var(--ink);box-shadow:none}
    .primary-btn:active,.secondary-btn:active,.ghost-btn:active{transform:translateY(3px);box-shadow:none}

    .player-tabs{
      display:flex;
      gap:9px;
      margin:-1px -2px 12px;
      padding:2px 2px 5px;
      overflow-x:auto;
      scrollbar-width:none;
      scroll-snap-type:x proximity;
    }
    .player-tabs::-webkit-scrollbar{display:none}
    .player-tab{
      flex:1 0 155px;
      min-width:0;
      display:grid;
      grid-template-columns:43px 1fr auto;
      align-items:center;
      gap:8px;
      min-height:66px;
      padding:7px 9px;
      border:3px solid var(--ink);
      border-radius:20px;
      background:#fffdf8;
      box-shadow:var(--soft-shadow);
      cursor:pointer;
      scroll-snap-align:start;
    }
    .player-tab[aria-selected="true"]{background:#25282e;color:#fff}
    .player-tab img{width:43px;height:43px;border-radius:13px;object-fit:contain;background:#eaf7fb;border:2px solid rgba(255,255,255,.75)}
    .tab-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font:900 14px/1 var(--rounded);text-align:left}
    .tab-points{padding:8px 10px;border-radius:999px;background:var(--gold);color:var(--ink);font:900 13px/1 var(--rounded);white-space:nowrap;border:2px solid rgba(134,95,0,.18)}
    .progress-card{
      position:relative;
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px 14px;
      padding:14px 17px 16px;
      margin-bottom:13px;
      border:3px solid var(--ink);
      border-radius:22px;
      background:rgba(255,253,248,.98);
      box-shadow:var(--soft-shadow);
    }
    .progress-card h2{margin:0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font:900 19px/1.1 var(--rounded)}
    .progress-meta{align-self:center;color:var(--ink-soft);font:900 12px/1 var(--rounded);white-space:nowrap}
    .score-big{color:var(--red);font:950 28px/1 var(--rounded);letter-spacing:-.04em;white-space:nowrap}
    .progress-rail{
      grid-column:1/-1;
      position:relative;
      height:18px;
      border:3px solid var(--ink);
      border-radius:999px;
      background:repeating-linear-gradient(90deg,#d6cec1 0 13px,#f8f4eb 13px 26px);
      overflow:visible;
    }
    .progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#d81c2d,#b80f1d);transition:width .42s ease}
    .progress-truck{
      position:absolute;
      left:clamp(12px,var(--progress),calc(100% - 15px));
      top:50%;
      width:38px;height:38px;
      transform:translate(-50%,-50%);
      object-fit:contain;
      border-radius:10px;
      background:#fff;
      border:2px solid var(--ink);
      filter:drop-shadow(0 2px 0 rgba(37,40,46,.15));
      transition:left .42s ease;
    }
    .swap-notice{
      margin:0 0 10px;padding:10px 12px;border-radius:14px;
      background:#fff2c7;border:2px solid #d5a500;color:#604a00;
      font:900 12px/1.25 var(--rounded);text-align:center;
    }
    .game-grid{display:grid;gap:10px;grid-template-columns:repeat(var(--cols),minmax(0,1fr));padding-bottom:4px}
    .spot-card{
      position:relative;
      min-width:0;
      min-height:174px;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      justify-content:space-between;
      overflow:hidden;
      padding:28px 8px 9px;
      border:3px solid var(--ink);
      border-radius:20px;
      background:#fffdf8;
      box-shadow:0 4px 0 rgba(37,40,46,.13);
      cursor:pointer;
      transition:.15s transform,.15s box-shadow,.18s opacity,.18s border-color;
    }
    .spot-card:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(37,40,46,.12)}
    .spot-card.special{border-color:var(--red);background:linear-gradient(#fff,#fff4f5)}
    .spot-card.turbo{border-color:#ad8a17;background:linear-gradient(#fffdf7,#fff7d7)}
    .spot-card.swappable{animation:swap-pulse .72s ease-in-out infinite alternate;border-color:#c69b00}
    .spot-card.locked{opacity:.48;cursor:not-allowed}
    @keyframes swap-pulse{to{box-shadow:0 7px 0 rgba(170,132,0,.22);filter:brightness(1.035)}}
    .point-badge{
      position:absolute;z-index:3;right:8px;top:7px;
      min-width:43px;padding:6px 8px;border-radius:999px;
      background:#25282e;color:#fff;text-align:center;
      font:900 12px/1 var(--rounded);box-shadow:0 2px 0 rgba(0,0,0,.15);
    }
    .special .point-badge{background:var(--red)}
    .turbo .point-badge{background:var(--gold);color:#493a00;border:1.5px solid #b88d00}
    .special-star{position:absolute;left:10px;top:7px;z-index:3;color:#f5c51d;font-size:22px;line-height:1;filter:drop-shadow(0 1px 0 #8e6900)}
    .card-art-wrap{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 -2px 4px;
      overflow:hidden;
      border-radius:13px;
      background:#fbf8f0;
    }
    .card-art{display:block;width:100%;height:100%;max-height:116px;object-fit:cover;object-position:center;transition:.18s filter,.18s opacity,.18s transform}
    .card-label{
      display:flex;align-items:center;justify-content:center;
      min-height:32px;
      color:var(--ink);
      font:900 13px/1.08 var(--rounded);
      letter-spacing:-.015em;
      text-align:center;
      overflow-wrap:anywhere;
    }
    .done .card-art{filter:grayscale(.35);opacity:.35;transform:scale(.97)}
    .done .card-label{color:#9a9a96}
    .done-stamp{
      position:absolute;z-index:5;left:50%;top:52%;
      transform:translate(-50%,-50%) rotate(-8deg);
      padding:5px 8px;border:4px solid var(--red);border-radius:8px;
      color:var(--red);background:rgba(255,255,255,.92);
      font:950 clamp(13px,2.7vw,21px)/1 var(--rounded);letter-spacing:.08em;
      box-shadow:0 2px 0 rgba(0,0,0,.09);
      white-space:nowrap;
    }
    .just-done{animation:card-pop .5s ease both}
    .just-swapped{animation:card-swap .6s ease both}
    @keyframes card-pop{35%{transform:scale(1.06) rotate(-1deg)}65%{transform:scale(.98) rotate(.5deg)}}
    @keyframes card-swap{0%{transform:rotateY(85deg);opacity:.2}100%{transform:none;opacity:1}}
    .game-grid.cols-4{gap:7px}
    .game-grid.cols-4 .spot-card{min-height:143px;padding:24px 6px 7px;border-radius:16px;border-width:2.5px}
    .game-grid.cols-4 .card-art{max-height:88px}
    .game-grid.cols-4 .card-label{font-size:11px;min-height:27px}

    }


    /* v5.2 exact Ahola mascot, unobstructed, with the original moving background retained. */
    .hero{flex-basis:clamp(210px,31vw,286px)!important}
    .app.ingame .hero{flex-basis:174px!important}
    .hero-truck,
    .app.ingame .hero-truck{
      left:50%;right:auto;

<body>
  <div class="app" id="app" data-phase="day">
    <header class="hero" aria-label="Aito Ahola-pikkurekka liikkuvassa maisemassa">
      <div class="scene" aria-hidden="true">
        <div class="stars"></div>
        <div class="sun-moon"></div>

          <i class="cloud" style="--x:4%;--y:6px;--s:.72"></i><i class="cloud" style="--x:18%;--y:26px;--s:.52"></i><i class="cloud" style="--x:33%;--y:5px;--s:.86"></i><i class="cloud" style="--x:44%;--y:31px;--s:.48"></i>
          <i class="cloud" style="--x:54%;--y:6px;--s:.72"></i><i class="cloud" style="--x:68%;--y:26px;--s:.52"></i><i class="cloud" style="--x:83%;--y:5px;--s:.86"></i><i class="cloud" style="--x:94%;--y:31px;--s:.48"></i>
        </div>
        <div class="hills"></div>
        <div class="tree-track">
          <i class="tree" style="--x:4%;--s:.65"></i><i class="tree" style="--x:10%;--s:.95"></i><i class="tree" style="--x:18%;--s:.7"></i><i class="tree" style="--x:27%;--s:1.05"></i><i class="tree" style="--x:36%;--s:.77"></i><i class="tree" style="--x:44%;--s:.58"></i>
          <i class="tree" style="--x:54%;--s:.65"></i><i class="tree" style="--x:60%;--s:.95"></i><i class="tree" style="--x:68%;--s:.7"></i><i class="tree" style="--x:77%;--s:1.05"></i><i class="tree" style="--x:86%;--s:.77"></i><i class="tree" style="--x:94%;--s:.58"></i>

    <div class="hero-meta" aria-label="Pelin otsikko ja ylätoiminnot">

        <span>Vaihda</span>

  <script>

  function shuffle(list){
    const arr=list.slice();
    for(let i=arr.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];

    return arr;
  }

  function makeCard(size){
    const total=size*size;
    const specialCount={3:3,4:5,5:6}[size]||3;
    const specials=[SPECIAL.find(item=>item.id==='ahola'),...shuffle(SPECIAL.filter(item=>item.id!=='ahola')).slice(0,specialCount-1)];

    if(normalIndexes.length) card[normalIndexes[Math.floor(Math.random()*normalIndexes.length)]].turbo=true;
    return card;
  }

      const id=LEGACY_IDS[oldId]||oldId;
      if(!ITEM_BY_ID.has(id)) return null;
      return {id,done:!!raw.done,turbo:!!raw.turbo};
    });
    if(normalized.some(cell=>!cell)) return makeCard(size);
    return normalized;
  }

  function normalizeState(raw){
    const next={...DEFAULT_STATE,...(raw||{})};
    next.size=[3,4,5].includes(Number(next.size))?Number(next.size):3;
    next.count=Math.max(1,Math.min(4,Number(next.count)||2));
    next.names=Array.from({length:4},(_,i)=>String((next.names||[])[i]||''));
    next.current=Math.max(0,Number(next.current??next.cur??0)||0);
    next.phase=['day','dusk','night'].includes(next.phase)?next.phase:'day';
    next.players=Array.isArray(next.players)?next.players.map((player,index)=>({
      name:String(player.name||`Pelaaja ${index+1}`),
      card:normalizeCard(player.card,next.size),
      celebrated:Array.isArray(player.celebrated)?player.celebrated:[],
      fullCelebrated:!!(player.fullCelebrated||player.fullDone),
      swapsLeft:Number.isFinite(Number(player.swapsLeft))?Math.max(0,Number(player.swapsLeft)):3
    })):[];
    if(next.current>=next.players.length) next.current=0;
    if(!['setup','game','results'].includes(next.screen)) next.screen=next.players.length?'game':'setup';
    return next;
  }

  function loadState(){
    const keys=[STORAGE_KEY,'kivaa-matkalla-v4','kivaa-matkalla-v3','kivaa-matkalla-v2'];
    for(const key of keys){
      try{
        const raw=localStorage.getItem(key);
        if(raw) return normalizeState(JSON.parse(raw));
      }catch(error){}
    }
    const hour=new Date().getHours();
    const phase=hour>=21||hour<6?'night':hour>=18?'dusk':'day';
    return {...DEFAULT_STATE,phase};
  }

  let state=loadState();

  function cellItem(cell){return ITEM_BY_ID.get(cell.id)||EVERYDAY[0]}
  function effectivePoints(cell){return cellItem(cell).points*(cell.turbo?2:1)}
  function doneCount(player){return player.card.filter(cell=>cell.done).length}
  function bingoLines(size){
    const lines=[];
    for(let row=0;row<size;row++) lines.push(Array.from({length:size},(_,col)=>row*size+col));
    for(let col=0;col<size;col++) lines.push(Array.from({length:size},(_,row)=>row*size+col));
    lines.push(Array.from({length:size},(_,i)=>i*size+i));
    lines.push(Array.from({length:size},(_,i)=>i*size+(size-1-i)));
    return lines;
  }
  function completedLineIndexes(player){
    return bingoLines(state.size).map((line,index)=>line.every(cellIndex=>player.card[cellIndex]?.done)?index:-1).filter(index=>index>=0);
  }
  function score(player){
    const base=player.card.filter(cell=>cell.done).reduce((sum,cell)=>sum+effectivePoints(cell),0);
    const lineBonus=completedLineIndexes(player).length*5;
    const fullBonus=player.card.every(cell=>cell.done)?15:0;
    return base+lineBonus+fullBonus;
  }
  function evaluateAchievements(player){
    const lines=completedLineIndexes(player);
    const newLines=lines.filter(index=>!player.celebrated.includes(index));
    if(newLines.length) player.celebrated.push(...newLines);
    const full=player.card.every(cell=>cell.done);
    const newFull=full&&!player.fullCelebrated;
    if(newFull) player.fullCelebrated=true;
    return {newLines,newFull};
  }

  const sfx=(()=>{
    let context=null;
    const getContext=()=>{
      if(!state.sound) return null;
      if(!context){
        const AC=window.AudioContext||window.webkitAudioContext;
        if(!AC) return null;
        context=new AC();
      }
      if(context.state==='suspended') context.resume().catch(()=>{});
      return context;
    };
    const sample=name=>{
      if(!state.sound||!EL_SOUNDS||!EL_SOUNDS[name]) return false;
      try{const audio=new Audio(EL_SOUNDS[name]);audio.volume=.8;audio.play().catch(()=>{});return true}catch(error){return false}
    };
    const tone=(freq,delay=0,duration=.1,type='sine',gain=.12,slide=0)=>{
      const ctx=getContext();if(!ctx)return;
      const osc=ctx.createOscillator();const volume=ctx.createGain();
      osc.type=type;osc.frequency.setValueAtTime(freq,ctx.currentTime+delay);
      if(slide) osc.frequency.linearRampToValueAtTime(Math.max(30,freq+slide),ctx.currentTime+delay+duration);
      volume.gain.setValueAtTime(.0001,ctx.currentTime+delay);
      volume.gain.exponentialRampToValueAtTime(gain,ctx.currentTime+delay+.012);
      volume.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+delay+duration);
      osc.connect(volume).connect(ctx.destination);osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+duration+.03);
    };
    return {
      click(){if(sample('click'))return;tone(650,0,.055,'sine',.11)},
      tab(){if(sample('tab'))return;tone(470,0,.06,'triangle',.11);tone(680,.055,.07,'triangle',.1)},
      stamp(special=false){if(sample(special?'stamp2':'stamp'))return;tone(145,0,.07,'square',.18);tone(special?850:500,.06,.11,'triangle',.1)},
      undo(){if(sample('undo'))return;tone(520,0,.1,'sine',.1,-210)},
      swap(){if(sample('swap'))return;tone(450,0,.07,'triangle',.1);tone(700,.07,.09,'triangle',.12)},
      honk(){if(sample('honk'))return;tone(300,0,.16,'square',.2);tone(300,.2,.24,'square',.22)},
      fanfare(){if(sample('fanfare'))return;[523,659,784,1047].forEach((freq,index)=>tone(freq,index*.1,.17,'triangle',.16))},
      engine(){if(sample('engine'))return;tone(90,0,.46,'sawtooth',.14,55);tone(145,.4,.3,'sawtooth',.12,30)},
      speak(text){
        if(!state.sound||!('speechSynthesis' in window))return;
        try{speechSynthesis.cancel();const utterance=new SpeechSynthesisUtterance(text);utterance.lang='fi-FI';utterance.rate=1.04;utterance.pitch=1.1;utterance.volume=.82;speechSynthesis.speak(utterance)}catch(error){}
      }
    };
  })();

  function playClip(name,fallback){

    else if(fallback)sfx.speak(fallback);
  }

  function confettiBurst(count=26){
    if(reducedMotion)return;
    const palette=['#c81726','#f2c83d','#3c94c8','#6aae43','#ee87a1'];
    const area=app.getBoundingClientRect();
    for(let i=0;i<count;i++){
      const piece=document.createElement('i');piece.className='confetti';
      piece.style.left=`${Math.random()*area.width}px`;piece.style.top=`${10+Math.random()*45}px`;piece.style.background=palette[i%palette.length];piece.style.animationDelay=`${Math.random()*.24}s`;piece.style.transform=`rotate(${Math.random()*180}deg)`;
      app.appendChild(piece);setTimeout(()=>piece.remove(),1800);
    }
  }

  function flyPoints(index,text,gold=false){
    if(reducedMotion)return;
    const card=main.querySelector(`[data-card-index="${index}"]`);if(!card)return;
    const cardRect=card.getBoundingClientRect();const appRect=app.getBoundingClientRect();
    const fly=document.createElement('div');fly.className=`fly-points${gold?' gold':''}`;fly.textContent=text;
    fly.style.left=`${cardRect.left-appRect.left+cardRect.width/2}px`;fly.style.top=`${cardRect.top-appRect.top+cardRect.height*.35}px`;
    app.appendChild(fly);setTimeout(()=>fly.remove(),1100);
  }

  function syncChrome(){

  }

  function renderGame(justIndex=-1,swappedIndex=-1){
    if(!state.players.length){renderSetup();return}
    state.screen='game';syncChrome();
    const scroll=main.scrollTop;
    const player=state.players[state.current];
    const done=doneCount(player);const total=player.card.length;const progress=Math.round(done/total*100);
    const tabs=state.players.length>1?`<div class="player-tabs" role="tablist" aria-label="Pelaajat">${state.players.map((item,index)=>`

    const cards=player.card.map((cell,index)=>{
      const item=cellItem(cell);const locked=swapMode&&(cell.done||cell.id==='ahola');const swappable=swapMode&&!locked;const finalPoints=effectivePoints(cell);
      const classes=['spot-card',item.special?'special':'',cell.turbo?'turbo':'',cell.done?'done':'',index===justIndex?'just-done':'',index===swappedIndex?'just-swapped':'',swappable?'swappable':'',locked?'locked':''].filter(Boolean).join(' ');

    main.innerHTML=`

  const ui={

      if(swapMode){
        if(cell.done){showToast('Bongattua korttia ei voi vaihtaa');return}
        if(cell.id==='ahola'){showToast('Aholan auto pysyy aina kortilla');setMood('Minä pysyn mukana!','happy',1600);return}
        const pool=(item.special?SPECIAL:EVERYDAY).filter(candidate=>!player.card.some(current=>current.id===candidate.id));
        if(!pool.length){showToast('Uutta korttia ei löytynyt');return}
        const replacement=pool[Math.floor(Math.random()*pool.length)];
        player.card[index]={id:replacement.id,done:false,turbo:cell.turbo};player.swapsLeft-=1;swapMode=false;saveState();sfx.swap();setMood('Uusi bongaus!','happy',1400);renderGame(-1,index);showToast(`${item.label} → ${replacement.label}`);return;
      }
      cell.done=!cell.done;let achievement={newLines:[],newFull:false};if(cell.done)achievement=evaluateAchievements(player);saveState();renderGame(cell.done?index:-1);
      if(!cell.done){sfx.undo();setMood('Bongaus peruttu','happy',1000);showToast('↩ Bongaus peruttu');return}
      const points=effectivePoints(cell);flyPoints(index,`+${points} p`,item.special||cell.turbo);
      if(cell.id==='ahola'){sfx.honk();setMood('Tööt tööt!','surprised',1900);showToast(`AHOLAN AUTO! +${points} p`,'gold');playClip('say_ahola','Aholan auto!')}
      else if(item.special){sfx.stamp(true);setMood('Harvinainen löytö!','happy',1600);showToast(`★ ${item.label} +${points} p`,'gold')}
      else if(cell.turbo){sfx.stamp(true);setMood('Tuplapisteet!','happy',1600);showToast(`⚡ TUPLA! ${item.label} +${points} p`,'gold')}
      else{sfx.stamp(false);setMood('Hyvä bongaus!','happy',1100);showToast(`✓ ${item.label} +${points} p`)}
      if(achievement.newFull){sfx.fanfare();playClip('say_taysi','Täysi kortti! Mahtavaa!');setTimeout(()=>showCelebration('TÄYSI KORTTI!',`${player.name} bongasi kaiken ja sai lisäksi 15 bonuspistettä!`),650)}
      else if(achievement.newLines.length){sfx.fanfare();playClip('say_bingo','Bingo!');setTimeout(()=>showCelebration('BINGO!',`${player.name} sai ${achievement.newLines.length>1?achievement.newLines.length+' uutta riviä':'uuden rivin'} ja 5 bonuspistettä per rivi!`),550)}
    },
    toggleSound(){state.sound=!state.sound;saveState();syncChrome();if(state.sound){sfx.click();showToast('Äänet päällä')}else{try{speechSynthesis.cancel()}catch(error){}showToast('Äänet mykistetty') }},
    showResults(){sfx.click();state.screen='results';renderResults()},
    backToGame(){state.screen='game';sfx.click();renderGame()},
    newRound(){
      modalRoot.innerHTML=`<div class="modal-wrap" role="presentation"><section class="sheet" role="dialog" aria-modal="true" aria-labelledby="newRoundTitle"><div class="grabber"></div><div class="sheet-head"><h2 id="newRoundTitle">Arvotaanko uudet kortit?</h2><button class="close-btn" type="button" onclick="ui.closeModal()" aria-label="Sulje">×</button></div><p class="catalog-intro">Pelaajien nimet säilyvät, mutta bongaukset, pisteet ja vaihdot alkavat alusta.</p><div class="sheet-actions"><button class="primary-btn" type="button" onclick="ui.confirmNewRound()">Arvo uudet kortit</button><button class="ghost-btn" type="button" onclick="ui.closeModal()">Peruuta</button></div></section></div>`;
    },
    confirmNewRound(){state.players=state.players.map(player=>({...player,card:makeCard(state.size),celebrated:[],fullCelebrated:false,swapsLeft:3}));state.current=0;state.screen='game';swapMode=false;closeModal();saveState();sfx.engine();setMood('Uusi kierros!','happy',1600);renderGame()},
    editPlayers(){state.names=Array.from({length:4},(_,index)=>state.players[index]?.name||state.names[index]||'');state.count=Math.max(1,Math.min(4,state.players.length||state.count));state.screen='setup';sfx.click();render()},
    cyclePhase
  };

  $('swapBtn').addEventListener('click',()=>ui.toggleSwap());
  $('rulesBtn').addEventListener('click',()=>ui.showRules());
  $('soundBtn').addEventListener('click',()=>ui.toggleSound());
  $('resultsBtn').addEventListener('click',()=>ui.showResults());
  $('phaseBtn').addEventListener('click',()=>ui.cyclePhase());
  document.addEventListener('keydown',event=>{if(event.key==='Escape'&&modalRoot.firstElementChild)closeModal()});
  modalRoot.addEventListener('click',event=>{if(event.target.classList.contains('modal-wrap'))closeModal()});

  render();
  </script>
</body>
</html>
